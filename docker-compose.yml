services:
  app:
    build:
      context: .
      target: dev
    image: satellite-tracker:dev
    ports:
      - "5173:5173"
    environment:
      LIVE_REFRESH: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.app.json:/app/tsconfig.app.json
      - ./tsconfig.node.json:/app/tsconfig.node.json
      - node_modules:/app/node_modules
    stdin_open: true
    tty: true

  prod:
    profiles: ["prod"]
    build:
      context: .
      target: prod
    image: satellite-tracker:prod
    ports:
      - "8080:80"

volumes:
  node_modules:
